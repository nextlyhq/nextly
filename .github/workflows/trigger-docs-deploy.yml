name: Trigger Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/content/**'

# The job only curls an external deploy hook; it never uses the
# GITHUB_TOKEN, so the token gets no permissions at all.
permissions: {}

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DOCS_DEPLOY_HOOK }}"
          echo "Triggered Vercel deploy for docs update"
