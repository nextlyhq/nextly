# F18: integration test matrix
# Runs *.integration.test.ts files against real PG 15, PG 17, MySQL 8, and SQLite.
# Failures here block the PR (no continue-on-error).
#
# Why a separate workflow file: the existing ci.yml runs unit tests with
# continue-on-error: true to accommodate pre-existing test debt. F18's
# integration matrix must be strict — false negatives on cross-dialect
# claims would let real bugs ship.

name: Integration Tests

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PostgreSQL 15 — F17 minimum version
  postgres15:
    name: Integration / PostgreSQL 15
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: nextly_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nextly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Wait for Postgres
        run: ./scripts/wait-for-db.sh localhost 5434 60

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Run integration tests against PG 15
        run: pnpm turbo test:integration --filter='@revnixhq/adapter-postgres' --filter='@revnixhq/nextly'
        env:
          TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5434/nextly_test

  # PostgreSQL 17 — current latest
  postgres17:
    name: Integration / PostgreSQL 17
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nextly_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nextly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Wait for Postgres
        run: ./scripts/wait-for-db.sh localhost 5435 60

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Run integration tests against PG 17
        run: pnpm turbo test:integration --filter='@revnixhq/adapter-postgres' --filter='@revnixhq/nextly'
        env:
          TEST_POSTGRES_URL: postgres://postgres:postgres@localhost:5435/nextly_test

  # MySQL 8.0
  mysql:
    name: Integration / MySQL 8.0
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: nextly_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Wait for MySQL
        run: ./scripts/wait-for-db.sh localhost 3307 90

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Run integration tests against MySQL 8
        # F8 PR 7 fix: include @revnixhq/nextly so the cross-dialect
        # matrix tests in `domains/schema/pipeline/__tests__/` exercise
        # against MySQL too. Previously only adapter-mysql ran here,
        # leaving F5 NOT-NULL coercion + F4 Option E paths uncovered
        # on MySQL CI.
        run: pnpm turbo test:integration --filter='@revnixhq/adapter-mysql' --filter='@revnixhq/nextly'
        env:
          TEST_MYSQL_URL: mysql://root:root@localhost:3307/nextly_test

  # SQLite (in-memory; no service needed)
  sqlite:
    name: Integration / SQLite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Run integration tests against SQLite (in-memory)
        # F8 PR 7 fix: include @revnixhq/nextly so the SQLite-based
        # cross-dialect matrix tests run here too. Previously the
        # filter was adapter-sqlite only and the new
        # `f8-matrix.integration.test.ts` (which uses better-sqlite3
        # in-memory) was filtered out.
        run: pnpm turbo test:integration --filter='@revnixhq/adapter-sqlite' --filter='@revnixhq/nextly'
