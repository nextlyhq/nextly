name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      # TODO(release-flow): remove continue-on-error once existing lint debt is
      # resolved. As of 2026-04-15 there are ~3.7k pre-existing warnings across
      # 9 packages (mostly no-explicit-any in nextly + admin). Tracked in a
      # follow-up "lint debt cleanup" project.
      - name: Lint
        continue-on-error: true
        run: pnpm turbo lint --continue
        env:
          TURBO_CACHE_DIR: .turbo

      # TODO(release-flow): remove continue-on-error once admin's TS errors are
      # resolved (~19 real type errors across FieldEditorDialog, SlashCommand,
      # RichTextGallery, etc.). nextly typechecks clean. Tracked in a follow-up
      # "admin typecheck cleanup" project.
      - name: Typecheck
        continue-on-error: true
        run: pnpm turbo check-types --continue
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Build
        run: pnpm turbo build --filter='./packages/*'
        env:
          TURBO_CACHE_DIR: .turbo

      # TODO(release-flow): remove continue-on-error once create-nextly-app's
      # vitest unhandled-error is debugged. 71/71 explicit tests pass but a
      # background async error currently fails the suite. Tracked in a
      # follow-up "create-nextly-app test stability" project.
      - name: Test
        continue-on-error: true
        run: pnpm turbo test --filter='./packages/*'
        env:
          TURBO_CACHE_DIR: .turbo

      # Strict: package.json shape / publish-readiness across all 13 publishable
      # packages. Failures here block the release pipeline.
      - name: publint
        run: pnpm -r --filter '@revnixhq/*' exec publint
        env:
          TURBO_CACHE_DIR: .turbo

      # Strict: type-resolution sanity for ESM consumers (Next.js apps).
      # Three rules ignored as documented structural choices, not bugs:
      #   - false-esm           (we ship .d.ts as ESM by design)
      #   - no-resolution       (subpath exports work in node16+; node10 EOL)
      #   - cjs-resolves-to-esm (CJS consumers unsupported; consumers must use
      #                          dynamic import())
      # All other attw rules remain active and would catch real regressions.
      - name: arethetypeswrong
        run: >-
          pnpm -r --filter '@revnixhq/*' exec
          attw --pack . --ignore-rules false-esm no-resolution cjs-resolves-to-esm
        env:
          TURBO_CACHE_DIR: .turbo