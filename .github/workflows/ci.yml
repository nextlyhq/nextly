name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Every job only reads the repo; nothing here writes, comments, or tags.
# Restricting the token caps what a compromised dependency or action
# could do with it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          # Nothing in this job pushes; keep the token out of git config.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # F1 PR 5: enforce that drizzle-kit stays exact-pinned in
      # `packages/nextly/package.json` `dependencies` (no caret/tilde,
      # not in peerDependencies). Cheap check, fails fast.
      - name: Check drizzle-kit pin
        run: pnpm check:drizzle-kit-pin

      # Enforce the design-token theming contract in the admin + plugin packages
      # (no hsl(var(--x)) wrappers, no hardcoded colors, no stray !important).
      # See packages/ui/docs/plugin-ui-authoring.md. Cheap check, fails fast.
      - name: Design tokens lint
        run: pnpm lint:design

      - name: Build
        run: pnpm turbo build --filter='./packages/*' --filter='./apps/*'
        env:
          TURBO_CACHE_DIR: .turbo

      # `./e2e` is named explicitly: it is a workspace member but sits under
      # neither glob, being neither something we publish nor something we run.
      - name: Lint
        run: pnpm turbo lint --continue --filter='./packages/*' --filter='./apps/*' --filter='./e2e'
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Typecheck
        run: pnpm turbo check-types --continue
        env:
          TURBO_CACHE_DIR: .turbo

      # Unit tests. Named packages rather than all of them: `nextly` and
      # `@nextlyhq/admin` carry a large pre-existing failing baseline (stale
      # test scaffolding, not product bugs) and are being repaired in a
      # follow-up that adds them here once green. Everything gated below passes
      # today, so a new failure in any of these packages is a real regression
      # and blocks the merge — which is the whole point, and the reason the job
      # was named "Test" long before it ran any.
      #
      # ui / storage-s3 / storage-uploadthing have no test files yet; listed so
      # they gate automatically the moment they gain one.
      - name: Test
        run: >-
          pnpm turbo test
          --filter=@nextlyhq/plugin-page-builder
          --filter=@nextlyhq/plugin-form-builder
          --filter=@nextlyhq/plugin-sdk
          --filter=@nextlyhq/ui
          --filter=@nextlyhq/adapter-drizzle
          --filter=@nextlyhq/adapter-postgres
          --filter=@nextlyhq/adapter-mysql
          --filter=@nextlyhq/adapter-sqlite
          --filter=@nextlyhq/storage-s3
          --filter=@nextlyhq/storage-uploadthing
          --filter=@nextlyhq/storage-vercel-blob
          --filter=@nextlyhq/telemetry
          --filter=create-nextly-app
        env:
          TURBO_CACHE_DIR: .turbo

      # Strict: package.json shape / publish-readiness across all 13 publishable
      # packages (nextly + create-nextly-app + 11 @nextlyhq/*). Failures here
      # block the release pipeline.
      - name: publint
        run: >-
          pnpm -r
          --filter '@nextlyhq/*'
          --filter 'nextly'
          --filter 'create-nextly-app'
          exec publint
        env:
          TURBO_CACHE_DIR: .turbo

      # Strict: type-resolution sanity for ESM consumers (Next.js apps).
      # Three rules ignored as documented structural choices, not bugs:
      #   - false-esm           (we ship .d.ts as ESM by design)
      #   - no-resolution       (subpath exports work in node16+; node10 EOL)
      #   - cjs-resolves-to-esm (CJS consumers unsupported; consumers must use
      #                          dynamic import())
      # All other attw rules remain active and would catch real regressions.
      - name: arethetypeswrong
        run: >-
          pnpm -r
          --filter '@nextlyhq/*'
          --filter 'nextly'
          --filter 'create-nextly-app'
          exec
          attw --pack . --ignore-rules false-esm no-resolution cjs-resolves-to-esm
        env:
          TURBO_CACHE_DIR: .turbo

  # The admin, in a real browser, against a real server and a real database.
  # Covers the class of failure the unit and integration suites structurally
  # cannot: jsdom has no layout engine, so a column that grew to 1024px or a
  # control outline that fails contrast measures the same whether the bug is
  # there or not. Runs after `ci` so a broken tree does not spend browser
  # minutes.
  #
  # The suite brings up its own playground on its own port, against its own
  # throwaway sqlite file. Nothing here touches a database anyone wanted.
  e2e:
    name: Browser tests
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job never pushes. Left on, the default keeps GITHUB_TOKEN in
          # the git config for everything that follows, which here is a pnpm
          # install and a browser download.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Keyed on the lockfile: the browser build only has to change when the
      # Playwright version does, and a download is most of this job's runtime.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm --filter @nextlyhq/e2e exec playwright install --with-deps chromium

      # The playground loads the admin and the plugins from their built output,
      # not their source, so a stale dist is a stale test.
      - name: Build packages
        run: pnpm turbo build --filter='./packages/*'
        env:
          TURBO_CACHE_DIR: .turbo

      - name: Run browser tests
        run: pnpm --filter @nextlyhq/e2e test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/.playwright/report
          retention-days: 7

  # Cross-platform smoke test for the scaffolder. Catches Windows path
  # separator bugs and macOS-specific issues that only surface in fresh
  # installs. Runs after the main `ci` job to avoid wasting minutes when
  # the core tree is broken.
  scaffold-smoke:
    name: Scaffold smoke (${{ matrix.os }})
    needs: [ci]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Nothing in this job pushes; keep the token out of git config.
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI + nextly core
        run: pnpm build --filter create-nextly-app --filter nextly

      - name: Pack create-nextly-app
        shell: bash
        run: |
          mkdir -p /tmp/nextly-pack
          (cd packages/create-nextly-app && pnpm pack --pack-destination /tmp/nextly-pack)

      - name: Scaffold blank template from tarball
        shell: bash
        run: |
          mkdir -p /tmp/scaffold-test
          cd /tmp/scaffold-test
          tarball=$(ls /tmp/nextly-pack/*.tgz | head -1)
          # `npm exec --package=<tarball> -- <bin-name>` is the explicit form;
          # `npx --yes <tarball>` regressed in npm 11 and routes the tarball
          # path through sh, producing "Permission denied" on the tgz file
          # across Linux/macOS/Windows. The explicit form avoids that path.
          # --yes skips interactive prompts (database, schema approach, etc.);
          # without it the CLI hangs on the non-TTY CI runner. --skip-install
          # avoids the multi-minute pnpm install during the smoke check.
          npm exec --yes --package="$tarball" -- create-nextly-app smoke-app --template blank --skip-install --yes
          test -f smoke-app/package.json && echo "scaffold ok"