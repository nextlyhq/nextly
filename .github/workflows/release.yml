name: Release

on:
  push:
    branches: [main]

# Only one release can run at a time. Never cancel a running publish.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Block publishing from forks
    if: github.repository == 'nextlyhq/nextly'

    # Reads RELEASE_BOT_TOKEN from the Production environment. Also enables
    # environment protection rules (required reviewers, wait timers).
    # The environment name "Production" MUST match the "Environment name"
    # configured on every package's Trusted Publisher entry at npmjs.com.
    environment: Production

    permissions:
      contents: write       # create git tags + GitHub Releases
      pull-requests: write  # open "Version Packages" PR
      id-token: write       # OIDC token for npm Trusted Publishing (also covers provenance)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use bot token so the Version PR it opens can trigger CI
          # GITHUB_TOKEN cannot trigger workflow runs on PR creation
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # .nvmrc is pinned at 22.14.0 (provides Node 22.14, the version
          # whose bundled npm we then upgrade in the next step).
          node-version-file: .nvmrc
          cache: pnpm
          # Writes ~/.npmrc with the registry URL for publishing
          registry-url: https://registry.npmjs.org

      # Node 22.14.0 ships bundled npm 10.9.x, which supports provenance but
      # NOT trusted publishing (separate OIDC audiences). Trusted publishing
      # requires npm >=11.5.1 to exchange the OIDC token at the registry for
      # publish auth. Without this upgrade the PUT request goes out without
      # a valid trusted-publisher token and the registry returns 404.
      - name: Upgrade npm to >=11.5.1 for trusted publishing
        run: npm install -g npm@latest

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Run when Version PR is merged. Builds then publishes.
          publish: pnpm release:publish
          # Run when changesets exist. Creates the Version PR.
          version: pnpm release:version
          commit: "chore: version packages"
          title: "chore: version packages"
          # Disabled: per-package GitHub Releases (one for every published
          # package, 12 per cycle: nextly + create-nextly-app + 10 @nextlyhq/*)
          # made the Releases sidebar noisy and put whichever package
          # timestamped last as "Latest". The consolidated release step below
          # creates ONE `vX.Y.Z` release per cycle that matches our `fixed[]`
          # lockstep model and Payload's release style.
          createGithubReleases: false

        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TURBO_CACHE_DIR: .turbo

      - name: Tag published packages as latest
        if: steps.changesets.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version')

          # Stable releases already become `latest`
          # No need to run dist-tag for them
          if [[ "$VERSION" != *-* ]]; then
            echo "Stable release ${VERSION} detected. Skipping dist-tag step."
            exit 0
          fi

          PACKAGES=(
            "nextly"
            "create-nextly-app"
            "@nextlyhq/admin"
            "@nextlyhq/ui"
            "@nextlyhq/adapter-drizzle"
            "@nextlyhq/adapter-postgres"
            "@nextlyhq/adapter-mysql"
            "@nextlyhq/adapter-sqlite"
            "@nextlyhq/storage-s3"
            "@nextlyhq/storage-uploadthing"
            "@nextlyhq/storage-vercel-blob"
            "@nextlyhq/plugin-form-builder"
            "@nextlyhq/plugin-redirects"
            "@nextlyhq/plugin-seo"
            "@nextlyhq/plugin-sdk"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "npm dist-tag add ${pkg}@${VERSION} latest"
            npm dist-tag add "${pkg}@${VERSION}" latest
          done

          echo "## dist-tag latest applied for v${VERSION}" >> $GITHUB_STEP_SUMMARY
          for pkg in "${PACKAGES[@]}"; do
            echo "- \`${pkg}@${VERSION}\` → latest" >> $GITHUB_STEP_SUMMARY
          done

      - name: Create consolidated GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          # All 12 packages share a version via `fixed[]`, so the first
          # entry's version is the canonical monorepo version.
          VERSION=$(echo "$PUBLISHED" | jq -r '.[0].version')
          TAG="v${VERSION}"

          # Build the release notes by extracting each package's CHANGELOG
          # section for this version and concatenating them under one
          # "What's changed" heading.
          NOTES_FILE=$(mktemp)
          {
            echo "Released all 12 packages at \`${VERSION}\` in lockstep (\`nextly\`, \`create-nextly-app\`, and 10 \`@nextlyhq/*\` packages)."
            echo
            echo "## What's changed"
            echo
            for pkg in $(echo "$PUBLISHED" | jq -r '.[].name'); do
              pkg_dir="packages/${pkg#@nextlyhq/}"
              CHANGELOG="${pkg_dir}/CHANGELOG.md"
              if [[ -f "$CHANGELOG" ]]; then
                # Extract everything between "## $VERSION" and the next "## "
                section=$(awk -v ver="## ${VERSION}" '
                  $0 == ver { found = 1; next }
                  found && /^## / { exit }
                  found { print }
                ' "$CHANGELOG")
                # Skip packages whose CHANGELOG didn't actually change for
                # this version (can happen for purely internal-dependency
                # bumps where changesets writes only "Patch Changes" with
                # no human-authored entry, still worth listing).
                if [[ -n "$section" ]]; then
                  echo "### ${pkg}"
                  echo
                  echo "$section"
                fi
              fi
            done
          } > "$NOTES_FILE"

          # Configure git for the bot so we can push the unified tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # SemVer pre-release versions contain a hyphen (e.g. 0.0.1-alpha.0,
          # 0.0.1-beta.2, 0.0.1-rc.1). Stable versions do not (0.0.1, 0.1.0,
          # 1.0.0). GitHub uses --prerelease to mark a release as pre-release
          # and --latest to flip the "Latest" badge to it. Pre-releases must
          # NEVER be the Latest, so we route on the version string.
          if [[ "$VERSION" == *-* ]]; then
            RELEASE_FLAG="--prerelease"
          else
            RELEASE_FLAG="--latest"
          fi

          # Idempotent: skip if the release already exists (e.g. a previous
          # workflow run partially completed)
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping creation"
          else
            # Create the unified tag pointing at the publish commit, then
            # the GitHub Release on top of it
            git tag "$TAG"
            git push origin "$TAG"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              $RELEASE_FLAG
          fi

          # Mirror the notes into the workflow run summary for visibility
          echo "## Released $TAG" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | "- **\(.name)** @ `\(.version)`"' \
            >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat "$NOTES_FILE" >> $GITHUB_STEP_SUMMARY
