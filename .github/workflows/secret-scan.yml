name: Secret scan

# Runs gitleaks on every PR + every push to main so
# nothing committed locally without the pre-commit hook (or pushed
# from someone bypassing it) lands in the repo unscanned.
#
# Pre-commit covers the local case via .husky/pre-commit; this is the
# enforcement gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The scan only reads history; the token never needs write access.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history is needed for `gitleaks detect` to scan every
          # commit in the PR range, not just the merge result.
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid license for org
      # repos as of mid-2023. Use the OSS binary directly — no license
      # required, same scan rules.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          # Checksum from the release's gitleaks_<ver>_checksums.txt. Verifying
          # before extraction means a tampered or substituted download fails
          # the job instead of executing.
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin gitleaks < /tmp/gitleaks.tar.gz
          gitleaks version

      # Scope the scan to only the commits this PR (or push) adds, not
      # full history. Two reasons:
      #   1. Pre-existing findings in old commits aren't regressions and
      #      shouldn't block new merges. They get tracked as their own
      #      cleanup workstream.
      # On PRs, scan dev..HEAD. On push events, scan the push range
      # (before..after sha provided by the GITHUB_EVENT context).
      - name: Run gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --log-opts="origin/${{ github.base_ref }}..HEAD" \
            --redact --no-banner --verbose

      - name: Run gitleaks (push range)
        if: github.event_name == 'push'
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.event.after }}'
          # First push to a branch sets `before` to all-zeros; in that
          # case fall back to scanning just the head commit.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${AFTER}~1..${AFTER}"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
          gitleaks detect \
            --source . \
            --log-opts="$RANGE" \
            --redact --no-banner --verbose
