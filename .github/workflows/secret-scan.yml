name: Secret scan

# Audit M13 / T-024. Runs gitleaks on every PR + every push to dev so
# nothing committed locally without the pre-commit hook (or pushed
# from someone bypassing it) lands in the repo unscanned.
#
# Pre-commit covers the local case via .husky/pre-commit; this is the
# enforcement gate.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is needed for `gitleaks detect` to scan every
          # commit in the PR range, not just the merge result.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
