name: Secret scan

# Audit M13 / T-024. Runs gitleaks on every PR + every push to dev so
# nothing committed locally without the pre-commit hook (or pushed
# from someone bypassing it) lands in the repo unscanned.
#
# Pre-commit covers the local case via .husky/pre-commit; this is the
# enforcement gate.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is needed for `gitleaks detect` to scan every
          # commit in the PR range, not just the merge result.
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid license for org
      # repos as of mid-2023. Use the OSS binary directly — no license
      # required, same scan rules.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Scope the scan to only the commits this PR (or push) adds, not
      # full history. Two reasons:
      #   1. Pre-existing findings in old commits aren't regressions and
      #      shouldn't block new merges. They get tracked as their own
      #      cleanup workstream.
      #   2. Going-forward enforcement is the actual goal of T-024:
      #      stop NEW secrets from landing.
      # On PRs, scan dev..HEAD. On push events, scan the push range
      # (before..after sha provided by the GITHUB_EVENT context).
      - name: Run gitleaks (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --source . \
            --log-opts="origin/${{ github.base_ref }}..HEAD" \
            --redact --no-banner --verbose

      - name: Run gitleaks (push range)
        if: github.event_name == 'push'
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.event.after }}'
          # First push to a branch sets `before` to all-zeros; in that
          # case fall back to scanning just the head commit.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${AFTER}~1..${AFTER}"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
          gitleaks detect \
            --source . \
            --log-opts="$RANGE" \
            --redact --no-banner --verbose
