name: Secret scan

# Audit M13 / T-024. Runs gitleaks on every PR + every push to dev so
# nothing committed locally without the pre-commit hook (or pushed
# from someone bypassing it) lands in the repo unscanned.
#
# Pre-commit covers the local case via .husky/pre-commit; this is the
# enforcement gate.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is needed for `gitleaks detect` to scan every
          # commit in the PR range, not just the merge result.
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid license for org
      # repos as of mid-2023. Use the OSS binary directly — no license
      # required, same scan rules.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --verbose
