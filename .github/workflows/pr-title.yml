name: PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  # amannn/action-semantic-pull-request calls GitHub's commit-statuses
  # API; without statuses:write the action exits with
  # "Resource not accessible by integration" before validation.
  statuses: write

jobs:
  lint:
    name: Validate PR title follows Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        id: lint_pr_title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            nextly
            admin
            client
            ui
            adapter-postgres
            adapter-mysql
            adapter-sqlite
            adapter-drizzle
            storage-s3
            storage-vercel-blob
            storage-uploadthing
            plugin-form-builder
            plugin-page-builder
            plugin-sdk
            create-nextly-app
            eslint-config
            prettier-config
            tsconfig
            telemetry
            playground
            root
            ci
            docs
            deps
            release
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" starts with an uppercase character. Rewrite it lowercase to match Conventional Commits.
          wip: true

      - name: Post sticky comment on failure
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            ### PR title fails Conventional Commits check

            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

            Examples of valid titles:
            - `feat(admin): add role manager dialog`
            - `fix(adapter-postgres): handle connection pool exhaustion`
            - `chore(deps): bump zod to 4.2.0`

      - name: Clear sticky comment on success
        if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-title-lint-error
          delete: true
