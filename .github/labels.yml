# Source of truth for GitHub issue/PR labels.
# Synced to GitHub by .github/workflows/labels-sync.yml on push to main.
# Edit here, commit, merge — labels update automatically.

# ── type: ── what kind of issue/PR (auto-applied by issue templates)
- name: "type: bug"
  color: "d73a4a"
  description: "Reported defect"
- name: "type: feature"
  color: "fbca04"
  description: "New capability"
- name: "type: enhancement"
  color: "84b6eb"
  description: "Improvement to an existing feature"
- name: "type: docs"
  color: "d4c5f9"
  description: "Documentation only"
- name: "type: security"
  color: "b60205"
  description: "Security report or fix"

# ── status: ── lifecycle (only one at a time per issue)
- name: "status: needs-triage"
  color: "ededed"
  description: "Awaiting initial review by a maintainer"
- name: "status: confirmed"
  color: "26b5ce"
  description: "Reproduced and accepted by a maintainer"
- name: "status: needs-reproduction"
  color: "a29ada"
  description: "Awaiting a minimal reproduction from the reporter"
- name: "status: duplicate"
  color: "cfd3d7"
  description: "Duplicates an existing issue"
- name: "status: wontfix"
  color: "ffffff"
  description: "Intentional behavior or out of scope"

# ── severity: ── only on bugs
- name: "severity: critical"
  color: "b60205"
  description: "Security impact or breaks core usage with no workaround"
- name: "severity: high"
  color: "d93f0b"
  description: "Breaks a major feature; workaround is awkward"
- name: "severity: medium"
  color: "fbca04"
  description: "Breaks a feature but has a reasonable workaround"
- name: "severity: low"
  color: "85b270"
  description: "Minor issue or affects a niche use case"

# ── scope: ── which package or area (auto-applied to PRs by labeler.yml)
- name: "scope: core"
  color: "755aaf"
  description: "@revnixhq/nextly"
- name: "scope: ui"
  color: "755aaf"
  description: "@revnixhq/ui"
- name: "scope: admin"
  color: "755aaf"
  description: "@revnixhq/admin"
- name: "scope: db-adapter"
  color: "755aaf"
  description: "@revnixhq/adapter-* packages"
- name: "scope: storage-adapter"
  color: "755aaf"
  description: "@revnixhq/storage-* packages"
- name: "scope: plugin"
  color: "755aaf"
  description: "@revnixhq/plugin-* packages"
- name: "scope: cli"
  color: "755aaf"
  description: "@revnixhq/create-nextly-app"
- name: "scope: deps"
  color: "0366d6"
  description: "Dependency updates"

# ── flag: ── special markers (manual)
- name: "flag: breaking-change"
  color: "f6ae66"
  description: "Introduces a breaking change"
- name: "flag: regression"
  color: "f6ae66"
  description: "Worked in a prior release"
- name: "flag: needs-migration-guide"
  color: "f6ae66"
  description: "Requires user-facing migration documentation"
