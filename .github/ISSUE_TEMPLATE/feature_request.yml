name: Feature Request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["type: feature", "status: needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea! Please describe the **problem** first, then the proposed solution. Feature requests grounded in a real use case are far more likely to land.

        Before submitting:
        - Search [existing issues](https://github.com/revnix/nextly-dev/issues?q=is%3Aissue) and [discussions](https://github.com/revnix/nextly-dev/discussions) to see if it's already proposed.
        - Open-ended ideas without a clear problem are better suited to [Discussions](https://github.com/revnix/nextly-dev/discussions).

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      description: Which package would this feature live in?
      options:
        - "@revnixhq/nextly"
        - "@revnixhq/admin"
        - "@revnixhq/ui"
        - "@revnixhq/adapter-postgres"
        - "@revnixhq/adapter-mysql"
        - "@revnixhq/adapter-sqlite"
        - "@revnixhq/adapter-drizzle"
        - "@revnixhq/storage-s3"
        - "@revnixhq/storage-vercel-blob"
        - "@revnixhq/storage-uploadthing"
        - "@revnixhq/plugin-form-builder"
        - "@revnixhq/create-nextly-app"
        - "Repo tooling / CI / build"
        - "New package"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's the user story or pain point?
      placeholder: I'm always frustrated when ... / I can't currently do X because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Be as concrete as you can — API shape, UI behavior, config option, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you ruled them out.

  - type: dropdown
    id: breaking
    attributes:
      label: Would this be a breaking change?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, prior art in other libraries, related issues, etc.

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and discussions for similar proposals.
          required: true
        - label: I described a concrete problem, not just a desired feature in the abstract.
          required: true
        - label: I'd be open to discussing the design and trade-offs.
          required: false
